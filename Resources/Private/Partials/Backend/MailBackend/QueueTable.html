<h2>Queued mails</h2>
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>Subject</th>
            <th>Recipient</th>
            <th>Status</th>
            <th>Retries</th>
            <th>Scheduled at</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <f:for each="{queuedMails}" as="mail">
            <tr>
                <td>{mail.subject}</td>
                <td>{mail.recipient}</td>
                <td>{mail.status}</td>
                <td>{mail.retryCount}</td>
                <td><f:format.date format="d.m.Y H:i">{mail.scheduledAt}</f:format.date></td>
                <td>
                    <f:link.action action="resend" arguments="{uid: mail.uid}" class="btn btn-default btn-sm">Resend</f:link.action>
                    <f:link.action action="delete" arguments="{uid: mail.uid}" class="btn btn-danger btn-sm" additionalAttributes="{'data-confirm': 'Delete this mail from the queue?'}">Delete</f:link.action>
                </td>
            </tr>
        </f:for>
    </tbody>
</table>
