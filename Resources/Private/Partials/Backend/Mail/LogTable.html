<h2>Mail log</h2>
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>Subject</th>
            <th>Recipient</th>
            <th>Status</th>
            <th>Sent at</th>
            <th>Error message</th>
        </tr>
    </thead>
    <tbody>
        <f:for each="{loggedMails}" as="mail">
            <tr>
                <td>{mail.subject}</td>
                <td>{mail.recipient}</td>
                <td>{mail.status}</td>
                <td><f:format.date format="d.m.Y H:i">{mail.sentAt}</f:format.date></td>
                <td>{mail.errorMessage}</td>
            </tr>
        </f:for>
    </tbody>
</table>
