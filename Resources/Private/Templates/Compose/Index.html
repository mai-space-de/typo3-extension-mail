<f:layout name="Default" />
<f:section name="content">
    <div class="module-maimail">
        <h1>Compose Email</h1>

        <f:flashMessages />

        <f:form action="send" method="post" class="form-horizontal">
            <div class="form-group">
                <label class="col-sm-2 control-label">From</label>
                <div class="col-sm-10">
                    <f:form.textfield property="formData[sender]" value="{formData.sender}" class="form-control" placeholder="sender@example.com" required="required" />
                </div>
            </div>

            <div class="form-group">
                <label class="col-sm-2 control-label">To</label>
                <div class="col-sm-10">
                    <f:form.textfield property="formData[recipients]" value="{formData.recipients}" class="form-control" placeholder="recipient@example.com, Name &lt;other@example.com&gt;" required="required" />
                    <span class="help-block">Comma-separated email addresses. Supports "Name &lt;email&gt;" format.</span>
                </div>
            </div>

            <div class="form-group">
                <label class="col-sm-2 control-label">Subject</label>
                <div class="col-sm-10">
                    <f:form.textfield property="formData[subject]" value="{formData.subject}" class="form-control" placeholder="Email subject" required="required" />
                </div>
            </div>

            <div class="form-group">
                <label class="col-sm-2 control-label">Body</label>
                <div class="col-sm-10">
                    <f:form.textarea property="formData[body]" value="{formData.body}" class="form-control" rows="12" placeholder="Email body (HTML supported)" />
                    <span class="help-block">HTML is supported. Plain text alternative will be generated automatically.</span>
                </div>
            </div>

            <div class="form-group">
                <label class="col-sm-2 control-label">Priority</label>
                <div class="col-sm-10">
                    <f:form.select property="formData[priority]" value="{formData.priority}" class="form-control" style="width:auto;" options="{0: 'Normal (0)', 5: 'High (5)', 10: 'Urgent (10)', -5: 'Low (-5)'}" />
                </div>
            </div>

            <div class="form-group">
                <label class="col-sm-2 control-label">Send Mode</label>
                <div class="col-sm-10">
                    <div class="radio">
                        <label>
                            <input type="radio" name="formData[sendMode]" value="now" checked="checked" /> Send Now
                        </label>
                    </div>
                    <div class="radio">
                        <label>
                            <input type="radio" name="formData[sendMode]" value="queue" /> Add to Queue
                        </label>
                    </div>
                    <div class="radio">
                        <label>
                            <input type="radio" name="formData[sendMode]" value="scheduled" /> Schedule
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-group" id="scheduled-at-group" style="display:none;">
                <label class="col-sm-2 control-label">Schedule At</label>
                <div class="col-sm-10">
                    <f:form.textfield property="formData[scheduledAt]" value="{formData.scheduledAt}" class="form-control" type="datetime-local" />
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-offset-2 col-sm-10">
                    <button type="submit" class="btn btn-primary">Send / Queue</button>
                    <f:link.action action="index" class="btn btn-default">Reset</f:link.action>
                </div>
            </div>
        </f:form>

        <script>
            document.querySelectorAll('input[name="formData[sendMode]"]').forEach(function(radio) {
                radio.addEventListener('change', function() {
                    document.getElementById('scheduled-at-group').style.display =
                        this.value === 'scheduled' ? 'block' : 'none';
                });
            });
        </script>
    </div>
</f:section>
